<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Pretendard, -apple-system, sans-serif">
  <defs>
    <linearGradient id="awsBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1"/>
    </linearGradient>
    <linearGradient id="microvm" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff9900;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#ff9900;stop-opacity:0.05"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" rx="12" fill="url(#awsBg)"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#fff" font-size="18" font-weight="700">Fargate 내부 아키텍처 — Firecracker microVM 기반 격리</text>

  <!-- AWS Managed Layer -->
  <rect x="30" y="60" width="840" height="200" rx="8" fill="none" stroke="#ff9900" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="50" y="82" fill="#ff9900" font-size="13" font-weight="600">AWS 관리 영역</text>

  <!-- Physical Host -->
  <rect x="50" y="95" width="800" height="155" rx="6" fill="#0d1b2a" stroke="#334155" stroke-width="1"/>
  <text x="70" y="115" fill="#94a3b8" font-size="12">물리 호스트 (Bare Metal)</text>

  <!-- microVM 1 -->
  <rect x="70" y="125" width="230" height="110" rx="6" fill="url(#microvm)" stroke="#ff9900" stroke-width="1" filter="url(#shadow)"/>
  <text x="185" y="145" text-anchor="middle" fill="#ff9900" font-size="11" font-weight="600">Firecracker microVM</text>
  <rect x="85" y="155" width="200" height="30" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="185" y="175" text-anchor="middle" fill="#93c5fd" font-size="11">컨테이너 런타임</text>
  <rect x="85" y="195" width="95" height="30" rx="4" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1"/>
  <text x="132" y="215" text-anchor="middle" fill="#bfdbfe" font-size="10">Task A</text>
  <rect x="190" y="195" width="95" height="30" rx="4" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1"/>
  <text x="237" y="215" text-anchor="middle" fill="#bfdbfe" font-size="10">Sidecar</text>

  <!-- microVM 2 -->
  <rect x="320" y="125" width="230" height="110" rx="6" fill="url(#microvm)" stroke="#ff9900" stroke-width="1" filter="url(#shadow)"/>
  <text x="435" y="145" text-anchor="middle" fill="#ff9900" font-size="11" font-weight="600">Firecracker microVM</text>
  <rect x="335" y="155" width="200" height="30" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="435" y="175" text-anchor="middle" fill="#93c5fd" font-size="11">컨테이너 런타임</text>
  <rect x="335" y="195" width="200" height="30" rx="4" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1"/>
  <text x="435" y="215" text-anchor="middle" fill="#bfdbfe" font-size="10">Task B</text>

  <!-- microVM 3 -->
  <rect x="570" y="125" width="260" height="110" rx="6" fill="url(#microvm)" stroke="#ff9900" stroke-width="1" filter="url(#shadow)"/>
  <text x="700" y="145" text-anchor="middle" fill="#ff9900" font-size="11" font-weight="600">Firecracker microVM</text>
  <rect x="585" y="155" width="230" height="30" rx="4" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1"/>
  <text x="700" y="175" text-anchor="middle" fill="#93c5fd" font-size="11">컨테이너 런타임</text>
  <rect x="585" y="195" width="110" height="30" rx="4" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1"/>
  <text x="640" y="215" text-anchor="middle" fill="#bfdbfe" font-size="10">Task C</text>
  <rect x="705" y="195" width="110" height="30" rx="4" fill="#1e3a5f" stroke="#60a5fa" stroke-width="1"/>
  <text x="760" y="215" text-anchor="middle" fill="#bfdbfe" font-size="10">Sidecar</text>

  <!-- Isolation arrows -->
  <line x1="310" y1="135" x2="310" y2="225" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="560" y1="135" x2="560" y2="225" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="311" y="240" fill="#ef4444" font-size="9">격리</text>
  <text x="561" y="240" fill="#ef4444" font-size="9">격리</text>

  <!-- Developer Managed Layer -->
  <rect x="30" y="280" width="840" height="220" rx="8" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="50" y="302" fill="#3b82f6" font-size="13" font-weight="600">개발자 관리 영역</text>

  <!-- ENI / Networking -->
  <rect x="50" y="315" width="250" height="80" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="175" y="337" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">네트워크 (awsvpc)</text>
  <text x="175" y="357" text-anchor="middle" fill="#94a3b8" font-size="11">Task마다 ENI 할당</text>
  <text x="175" y="375" text-anchor="middle" fill="#94a3b8" font-size="11">Security Group 개별 적용</text>

  <!-- Storage -->
  <rect x="325" y="315" width="250" height="80" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="450" y="337" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">스토리지</text>
  <text x="450" y="357" text-anchor="middle" fill="#94a3b8" font-size="11">Ephemeral: 20GB (기본) ~ 200GB</text>
  <text x="450" y="375" text-anchor="middle" fill="#94a3b8" font-size="11">EFS 마운트 지원</text>

  <!-- IAM -->
  <rect x="600" y="315" width="250" height="80" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="725" y="337" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">IAM / 시크릿</text>
  <text x="725" y="357" text-anchor="middle" fill="#94a3b8" font-size="11">executionRole: ECR 풀, 로그</text>
  <text x="725" y="375" text-anchor="middle" fill="#94a3b8" font-size="11">taskRole: 앱 → AWS API</text>

  <!-- Key point -->
  <rect x="50" y="415" width="800" height="70" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="450" y="440" text-anchor="middle" fill="#fbbf24" font-size="12" font-weight="600">핵심: 각 Task는 독립된 microVM에서 실행된다</text>
  <text x="450" y="460" text-anchor="middle" fill="#94a3b8" font-size="11">다른 고객의 Task와 커널을 공유하지 않는다. EC2와 동등한 수준의 하드웨어 격리를 제공한다.</text>
  <text x="450" y="478" text-anchor="middle" fill="#94a3b8" font-size="11">Firecracker는 AWS가 Lambda용으로 만든 경량 VMM(Virtual Machine Monitor)이다. 부팅에 125ms 미만이 걸린다.</text>
</svg>