<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3b82f6"/>
    </marker>
    <marker id="arrGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#10b981"/>
    </marker>
    <marker id="arrRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#ef4444"/>
    </marker>
  </defs>

  <rect width="900" height="500" rx="12" fill="#f8fafc"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">ECS 배포 흐름 (CI/CD Pipeline)</text>

  <!-- Phase labels -->
  <rect x="30" y="55" width="100" height="28" rx="14" fill="#e0e7ff"/>
  <text x="80" y="74" text-anchor="middle" font-size="11" font-weight="600" fill="#3730a3">1. 소스</text>

  <rect x="200" y="55" width="100" height="28" rx="14" fill="#e0e7ff"/>
  <text x="250" y="74" text-anchor="middle" font-size="11" font-weight="600" fill="#3730a3">2. 빌드</text>

  <rect x="400" y="55" width="100" height="28" rx="14" fill="#e0e7ff"/>
  <text x="450" y="74" text-anchor="middle" font-size="11" font-weight="600" fill="#3730a3">3. 등록</text>

  <rect x="600" y="55" width="100" height="28" rx="14" fill="#e0e7ff"/>
  <text x="650" y="74" text-anchor="middle" font-size="11" font-weight="600" fill="#3730a3">4. 배포</text>

  <rect x="780" y="55" width="100" height="28" rx="14" fill="#e0e7ff"/>
  <text x="830" y="74" text-anchor="middle" font-size="11" font-weight="600" fill="#3730a3">5. 검증</text>

  <!-- Step 1: Source -->
  <rect x="30" y="100" width="140" height="70" rx="8" fill="#fff" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
  <text x="100" y="130" text-anchor="middle" font-size="12" font-weight="600" fill="#4338ca">코드 저장소</text>
  <text x="100" y="150" text-anchor="middle" font-size="10" fill="#64748b">GitHub / CodeCommit</text>

  <!-- Arrow 1→2 -->
  <line x1="170" y1="135" x2="200" y2="135" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr)"/>
  <text x="185" y="127" text-anchor="middle" font-size="9" fill="#64748b">push</text>

  <!-- Step 2: Build -->
  <rect x="200" y="100" width="160" height="70" rx="8" fill="#fff" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
  <text x="280" y="125" text-anchor="middle" font-size="12" font-weight="600" fill="#4338ca">CodeBuild</text>
  <text x="280" y="143" text-anchor="middle" font-size="10" fill="#64748b">docker build</text>
  <text x="280" y="158" text-anchor="middle" font-size="10" fill="#64748b">+ 테스트 실행</text>

  <!-- Arrow 2→3 -->
  <line x1="360" y1="135" x2="395" y2="135" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr)"/>
  <text x="377" y="127" text-anchor="middle" font-size="9" fill="#64748b">image</text>

  <!-- Step 3: Registry -->
  <rect x="395" y="100" width="140" height="70" rx="8" fill="#fff" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
  <text x="465" y="125" text-anchor="middle" font-size="12" font-weight="600" fill="#4338ca">ECR</text>
  <text x="465" y="143" text-anchor="middle" font-size="10" fill="#64748b">이미지 푸시</text>
  <text x="465" y="158" text-anchor="middle" font-size="10" fill="#64748b">태그: git-sha</text>

  <!-- Arrow 3→4 -->
  <line x1="535" y1="135" x2="570" y2="135" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 4: Deploy -->
  <rect x="570" y="100" width="170" height="70" rx="8" fill="#fff" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
  <text x="655" y="125" text-anchor="middle" font-size="12" font-weight="600" fill="#4338ca">ECS Service Update</text>
  <text x="655" y="143" text-anchor="middle" font-size="10" fill="#64748b">새 Task Definition</text>
  <text x="655" y="158" text-anchor="middle" font-size="10" fill="#64748b">리비전 등록</text>

  <!-- Arrow 4→5 -->
  <line x1="740" y1="135" x2="770" y2="135" stroke="#3b82f6" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Step 5: Verify -->
  <rect x="770" y="100" width="110" height="70" rx="8" fill="#fff" stroke="#6366f1" stroke-width="2" filter="url(#shadow)"/>
  <text x="825" y="125" text-anchor="middle" font-size="12" font-weight="600" fill="#4338ca">헬스 체크</text>
  <text x="825" y="143" text-anchor="middle" font-size="10" fill="#64748b">ALB 타겟</text>
  <text x="825" y="158" text-anchor="middle" font-size="10" fill="#64748b">등록 확인</text>

  <!-- Rolling Update Detail -->
  <rect x="30" y="210" width="840" height="270" rx="10" fill="#f0fdf4" stroke="#10b981" stroke-width="1.5"/>
  <text x="50" y="237" font-size="14" font-weight="700" fill="#065f46">Rolling Update 상세 흐름</text>

  <!-- Stage 1 -->
  <rect x="50" y="255" width="240" height="200" rx="8" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="170" y="277" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">1단계: 새 태스크 시작</text>

  <rect x="70" y="290" width="90" height="40" rx="5" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1"/>
  <text x="115" y="315" text-anchor="middle" font-size="11" fill="#1e40af">v1 Task</text>
  <rect x="70" y="340" width="90" height="40" rx="5" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1"/>
  <text x="115" y="365" text-anchor="middle" font-size="11" fill="#1e40af">v1 Task</text>
  <rect x="180" y="290" width="90" height="40" rx="5" fill="#bbf7d0" stroke="#10b981" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="225" y="308" text-anchor="middle" font-size="10" fill="#065f46">v2 Task</text>
  <text x="225" y="322" text-anchor="middle" font-size="9" fill="#64748b">시작 중...</text>

  <!-- Arrow 1→2 -->
  <line x1="290" y1="350" x2="320" y2="350" stroke="#10b981" stroke-width="2" marker-end="url(#arrGreen)"/>

  <!-- Stage 2 -->
  <rect x="320" y="255" width="240" height="200" rx="8" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="440" y="277" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">2단계: 트래픽 전환</text>

  <rect x="340" y="290" width="90" height="40" rx="5" fill="#bfdbfe" stroke="#3b82f6" stroke-width="1"/>
  <text x="385" y="315" text-anchor="middle" font-size="11" fill="#1e40af">v1 Task</text>
  <rect x="340" y="340" width="90" height="40" rx="5" fill="#fecaca" stroke="#ef4444" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="385" y="358" text-anchor="middle" font-size="10" fill="#991b1b">v1 종료 중</text>
  <rect x="450" y="290" width="90" height="40" rx="5" fill="#bbf7d0" stroke="#10b981" stroke-width="1.5"/>
  <text x="495" y="315" text-anchor="middle" font-size="11" fill="#065f46">v2 Task</text>
  <text x="440" y="415" text-anchor="middle" font-size="10" fill="#64748b">헬스 체크 통과 후 전환</text>

  <!-- Arrow 2→3 -->
  <line x1="560" y1="350" x2="590" y2="350" stroke="#10b981" stroke-width="2" marker-end="url(#arrGreen)"/>

  <!-- Stage 3 -->
  <rect x="590" y="255" width="260" height="200" rx="8" fill="#fff" stroke="#d1d5db" stroke-width="1"/>
  <text x="720" y="277" text-anchor="middle" font-size="12" font-weight="600" fill="#1e293b">3단계: 교체 완료</text>

  <rect x="620" y="290" width="90" height="40" rx="5" fill="#bbf7d0" stroke="#10b981" stroke-width="1.5"/>
  <text x="665" y="315" text-anchor="middle" font-size="11" fill="#065f46">v2 Task</text>
  <rect x="620" y="340" width="90" height="40" rx="5" fill="#bbf7d0" stroke="#10b981" stroke-width="1.5"/>
  <text x="665" y="365" text-anchor="middle" font-size="11" fill="#065f46">v2 Task</text>

  <rect x="740" y="310" width="90" height="35" rx="5" fill="#10b981"/>
  <text x="785" y="332" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">배포 완료</text>

  <text x="720" y="415" text-anchor="middle" font-size="10" fill="#64748b">desired count 유지 확인</text>
</svg>