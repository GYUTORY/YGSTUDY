<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <marker id="arrDown" markerWidth="8" markerHeight="6" refX="4" refY="6" orient="auto">
      <path d="M0,0 L4,6 L8,0" fill="#6366f1"/>
    </marker>
    <marker id="arrRight" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6366f1"/>
    </marker>
  </defs>

  <rect width="900" height="480" rx="12" fill="#f8fafc"/>
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">ECS Blue/Green Lifecycle Hooks 실행 순서</text>

  <!-- Legend -->
  <rect x="620" y="50" width="260" height="55" rx="8" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="635" y="65" width="16" height="16" rx="3" fill="#8b5cf6"/>
  <text x="658" y="77" font-size="10" fill="#1e293b">Lambda 훅 (사용자 정의)</text>
  <rect x="635" y="85" width="16" height="16" rx="3" fill="#e5e5e5" stroke="#999" stroke-width="1"/>
  <text x="658" y="97" font-size="10" fill="#1e293b">CodeDeploy 자동 처리</text>

  <!-- Step 1: BeforeInstall -->
  <rect x="50" y="130" width="160" height="70" rx="8" fill="#8b5cf6" filter="url(#shadow)"/>
  <text x="130" y="157" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">BeforeInstall</text>
  <text x="130" y="175" text-anchor="middle" font-size="9" fill="#e9d5ff">Green 태스크 세트 생성 전</text>
  <text x="130" y="190" text-anchor="middle" font-size="9" fill="#e9d5ff">사전 검증 Lambda</text>

  <!-- Arrow 1→2 -->
  <line x1="210" y1="165" x2="248" y2="165" stroke="#6366f1" stroke-width="2" marker-end="url(#arrRight)"/>

  <!-- Step 2: Install (auto) -->
  <rect x="250" y="130" width="160" height="70" rx="8" fill="#e5e5e5" stroke="#999" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="330" y="157" text-anchor="middle" font-size="12" font-weight="600" fill="#525252">Install</text>
  <text x="330" y="175" text-anchor="middle" font-size="9" fill="#737373">Green 태스크 세트 생성</text>
  <text x="330" y="190" text-anchor="middle" font-size="9" fill="#737373">(CodeDeploy 자동)</text>

  <!-- Arrow 2→3 -->
  <line x1="410" y1="165" x2="448" y2="165" stroke="#6366f1" stroke-width="2" marker-end="url(#arrRight)"/>

  <!-- Step 3: AfterInstall -->
  <rect x="450" y="130" width="160" height="70" rx="8" fill="#8b5cf6" filter="url(#shadow)"/>
  <text x="530" y="157" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">AfterInstall</text>
  <text x="530" y="175" text-anchor="middle" font-size="9" fill="#e9d5ff">Green 태스크 세트 생성 후</text>
  <text x="530" y="190" text-anchor="middle" font-size="9" fill="#e9d5ff">태스크 상태 확인 Lambda</text>

  <!-- Arrow 3→test traffic (auto) -->
  <line x1="610" y1="165" x2="648" y2="165" stroke="#6366f1" stroke-width="2" marker-end="url(#arrRight)"/>

  <!-- Test traffic routing (auto) -->
  <rect x="650" y="130" width="200" height="70" rx="8" fill="#e5e5e5" stroke="#999" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="750" y="152" text-anchor="middle" font-size="12" font-weight="600" fill="#525252">테스트 트래픽 라우팅</text>
  <text x="750" y="170" text-anchor="middle" font-size="9" fill="#737373">ALB 테스트 리스너 (:8443)</text>
  <text x="750" y="185" text-anchor="middle" font-size="9" fill="#737373">→ Green 타겟 그룹</text>
  <text x="750" y="198" text-anchor="middle" font-size="9" fill="#737373">(CodeDeploy 자동)</text>

  <!-- Arrow down to step 4 -->
  <line x1="750" y1="200" x2="750" y2="235" stroke="#6366f1" stroke-width="2"/>
  <line x1="750" y1="235" x2="200" y2="235" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="200" y1="235" x2="200" y2="268" stroke="#6366f1" stroke-width="2" marker-end="url(#arrDown)"/>

  <!-- Step 4: AfterAllowTestTraffic -->
  <rect x="50" y="270" width="260" height="80" rx="8" fill="#8b5cf6" filter="url(#shadow)"/>
  <rect x="55" y="275" width="70" height="20" rx="4" fill="#fbbf24"/>
  <text x="90" y="289" text-anchor="middle" font-size="9" font-weight="700" fill="#78350f">핵심 훅</text>
  <text x="180" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">AfterAllowTestTraffic</text>
  <text x="180" y="320" text-anchor="middle" font-size="9" fill="#e9d5ff">테스트 트래픽으로 Green 검증</text>
  <text x="180" y="335" text-anchor="middle" font-size="9" fill="#e9d5ff">API 응답 확인 / 통합 테스트 Lambda</text>

  <!-- Arrow 4→5 -->
  <line x1="310" y1="310" x2="358" y2="310" stroke="#6366f1" stroke-width="2" marker-end="url(#arrRight)"/>

  <!-- Step 5: BeforeAllowTraffic -->
  <rect x="360" y="270" width="210" height="80" rx="8" fill="#8b5cf6" filter="url(#shadow)"/>
  <text x="465" y="300" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">BeforeAllowTraffic</text>
  <text x="465" y="320" text-anchor="middle" font-size="9" fill="#e9d5ff">프로덕션 트래픽 전환 전</text>
  <text x="465" y="335" text-anchor="middle" font-size="9" fill="#e9d5ff">최종 검증 Lambda</text>

  <!-- Arrow 5→traffic switch -->
  <line x1="570" y1="310" x2="608" y2="310" stroke="#6366f1" stroke-width="2" marker-end="url(#arrRight)"/>

  <!-- Traffic switch (auto) -->
  <rect x="610" y="270" width="200" height="80" rx="8" fill="#e5e5e5" stroke="#999" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="710" y="295" text-anchor="middle" font-size="12" font-weight="600" fill="#525252">프로덕션 트래픽 전환</text>
  <text x="710" y="315" text-anchor="middle" font-size="9" fill="#737373">ALB 프로덕션 리스너 (:443)</text>
  <text x="710" y="330" text-anchor="middle" font-size="9" fill="#737373">→ Green 타겟 그룹</text>
  <text x="710" y="345" text-anchor="middle" font-size="9" fill="#737373">(CodeDeploy 자동)</text>

  <!-- Arrow down to step 6 -->
  <line x1="710" y1="350" x2="710" y2="375" stroke="#6366f1" stroke-width="2"/>
  <line x1="710" y1="375" x2="180" y2="375" stroke="#6366f1" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="180" y1="375" x2="180" y2="408" stroke="#6366f1" stroke-width="2" marker-end="url(#arrDown)"/>

  <!-- Step 6: AfterAllowTraffic -->
  <rect x="50" y="410" width="260" height="60" rx="8" fill="#8b5cf6" filter="url(#shadow)"/>
  <text x="180" y="435" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">AfterAllowTraffic</text>
  <text x="180" y="453" text-anchor="middle" font-size="9" fill="#e9d5ff">프로덕션 트래픽 전환 후 상태 확인 Lambda</text>

  <!-- Completion -->
  <rect x="350" y="415" width="100" height="50" rx="8" fill="#10b981"/>
  <text x="400" y="440" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">배포 완료</text>
  <text x="400" y="455" text-anchor="middle" font-size="9" fill="#d1fae5">Blue 정리</text>

  <line x1="310" y1="440" x2="348" y2="440" stroke="#10b981" stroke-width="2"/>

  <!-- Failure path note -->
  <rect x="530" y="410" width="340" height="60" rx="8" fill="#fef2f2" stroke="#fca5a5" stroke-width="1"/>
  <text x="700" y="432" text-anchor="middle" font-size="10" font-weight="600" fill="#991b1b">훅 실패 시 자동 롤백</text>
  <text x="700" y="448" text-anchor="middle" font-size="9" fill="#b91c1c">Lambda가 Failed 반환 → Green 태스크 종료</text>
  <text x="700" y="462" text-anchor="middle" font-size="9" fill="#b91c1c">→ Blue 유지 (트래픽 변경 없음)</text>
</svg>
