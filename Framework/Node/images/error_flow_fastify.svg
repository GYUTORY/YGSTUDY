<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
    <marker id="arrowO" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fb923c"/>
    </marker>
  </defs>

  <rect width="900" height="430" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#fb923c" font-size="17" font-weight="700">Fastify 에러 처리 흐름</text>
  <text x="450" y="55" text-anchor="middle" fill="#64748b" font-size="11">JSON Schema 검증이 핸들러 실행 전에 자동 수행 — 플러그인 스코프별 에러 핸들러 분리 가능</text>

  <!-- Main flow -->
  <!-- Request -->
  <rect x="50" y="90" width="110" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="105" y="112" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">클라이언트 요청</text>
  <text x="105" y="128" text-anchor="middle" fill="#64748b" font-size="9">HTTP Request</text>

  <line x1="160" y1="115" x2="195" y2="115" stroke="#34d399" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Schema Validation -->
  <rect x="195" y="80" width="155" height="70" rx="8" fill="#1e293b" stroke="#fb923c" stroke-width="2"/>
  <text x="272" y="105" text-anchor="middle" fill="#fb923c" font-size="12" font-weight="700">Schema 검증</text>
  <text x="272" y="122" text-anchor="middle" fill="#94a3b8" font-size="10">JSON Schema (Ajv)</text>
  <text x="272" y="138" text-anchor="middle" fill="#94a3b8" font-size="10">핸들러 실행 전 자동</text>

  <line x1="350" y1="115" x2="385" y2="115" stroke="#34d399" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- preHandler hook -->
  <rect x="385" y="85" width="140" height="60" rx="8" fill="#1e293b" stroke="#fb923c" stroke-width="1.5"/>
  <text x="455" y="108" text-anchor="middle" fill="#fb923c" font-size="11" font-weight="600">preHandler 훅</text>
  <text x="455" y="125" text-anchor="middle" fill="#94a3b8" font-size="10">인증, 권한 검사</text>
  <text x="455" y="138" text-anchor="middle" fill="#94a3b8" font-size="10">onRequest 등</text>

  <line x1="525" y1="115" x2="560" y2="115" stroke="#34d399" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Route Handler -->
  <rect x="560" y="85" width="140" height="60" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <text x="630" y="108" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="700">라우트 핸들러</text>
  <text x="630" y="125" text-anchor="middle" fill="#94a3b8" font-size="10">async (request, reply)</text>

  <line x1="700" y1="115" x2="735" y2="115" stroke="#34d399" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Response -->
  <rect x="735" y="90" width="110" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="790" y="112" text-anchor="middle" fill="#34d399" font-size="12" font-weight="600">reply.send()</text>
  <text x="790" y="128" text-anchor="middle" fill="#64748b" font-size="9">정상 응답</text>

  <!-- Error flow section -->
  <rect x="50" y="175" width="800" height="140" rx="10" fill="#1e1018" stroke="#ef4444" stroke-width="1" stroke-dasharray="5,3" opacity="0.7"/>
  <text x="70" y="198" fill="#ef4444" font-size="13" font-weight="700">에러 발생 시</text>

  <!-- Schema validation error -->
  <rect x="70" y="215" width="170" height="40" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="155" y="234" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">Schema 검증 실패</text>
  <text x="155" y="248" text-anchor="middle" fill="#94a3b8" font-size="9">error.validation 존재</text>

  <!-- Hook error -->
  <rect x="270" y="215" width="170" height="40" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="355" y="234" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">훅 에러</text>
  <text x="355" y="248" text-anchor="middle" fill="#94a3b8" font-size="9">throw in preHandler</text>

  <!-- Handler error -->
  <rect x="470" y="215" width="170" height="40" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="555" y="234" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="600">핸들러 에러</text>
  <text x="555" y="248" text-anchor="middle" fill="#94a3b8" font-size="9">throw in handler</text>

  <!-- setErrorHandler -->
  <rect x="280" y="275" width="250" height="30" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="405" y="295" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">setErrorHandler()</text>

  <!-- Arrows to setErrorHandler -->
  <line x1="155" y1="255" x2="350" y2="275" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowR)"/>
  <line x1="355" y1="255" x2="405" y2="275" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowR)"/>
  <line x1="555" y1="255" x2="460" y2="275" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowR)"/>

  <!-- Plugin scope section -->
  <rect x="50" y="340" width="800" height="75" rx="10" fill="#1e293b" stroke="#fb923c" stroke-width="1" stroke-dasharray="5,3"/>
  <text x="70" y="362" fill="#fb923c" font-size="12" font-weight="700">플러그인 스코프별 에러 핸들러</text>

  <!-- Scope boxes -->
  <rect x="70" y="372" width="220" height="30" rx="4" fill="#0f0f1a" stroke="#475569" stroke-width="1"/>
  <text x="180" y="392" text-anchor="middle" fill="#94a3b8" font-size="10">register(/api/v1) → 전용 setErrorHandler</text>

  <rect x="310" y="372" width="220" height="30" rx="4" fill="#0f0f1a" stroke="#475569" stroke-width="1"/>
  <text x="420" y="392" text-anchor="middle" fill="#94a3b8" font-size="10">register(/api/v2) → 전용 setErrorHandler</text>

  <rect x="550" y="372" width="280" height="30" rx="4" fill="#0f0f1a" stroke="#fb923c" stroke-width="1"/>
  <text x="690" y="392" text-anchor="middle" fill="#fb923c" font-size="10">글로벌 setErrorHandler (폴백)</text>
</svg>