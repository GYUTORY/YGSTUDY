<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="nest-layer" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2d1045"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <marker id="arrowP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f472b6"/>
    </marker>
  </defs>

  <rect width="900" height="430" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#a78bfa" font-size="17" font-weight="700">NestJS 요청 라이프사이클</text>
  <text x="450" y="55" text-anchor="middle" fill="#64748b" font-size="11">Express/Fastify 엔진 위에 Guard - Interceptor - Pipe 계층을 얹은 구조 (순서 고정)</text>

  <!-- Forward flow (top) -->
  <text x="50" y="82" fill="#a78bfa" font-size="11" font-weight="600">요청 흐름</text>

  <!-- Step 1: 요청 수신 -->
  <rect x="30" y="95" width="100" height="55" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="80" y="117" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">요청 수신</text>
  <text x="80" y="133" text-anchor="middle" fill="#64748b" font-size="9">HTTP Engine</text>

  <line x1="130" y1="122" x2="155" y2="122" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowP)"/>

  <!-- Step 2: 글로벌 미들웨어 -->
  <rect x="155" y="95" width="110" height="55" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="210" y="115" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">미들웨어</text>
  <text x="210" y="133" text-anchor="middle" fill="#94a3b8" font-size="9">Express 호환</text>
  <text x="210" y="145" text-anchor="middle" fill="#94a3b8" font-size="9">cors, helmet</text>

  <line x1="265" y1="122" x2="290" y2="122" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowP)"/>

  <!-- Step 3: Guard -->
  <rect x="290" y="90" width="110" height="65" rx="8" fill="url(#nest-layer)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="345" y="112" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700">Guard</text>
  <text x="345" y="128" text-anchor="middle" fill="#94a3b8" font-size="9">canActivate()</text>
  <text x="345" y="142" text-anchor="middle" fill="#f59e0b" font-size="9">false → 403 반환</text>

  <line x1="400" y1="122" x2="425" y2="122" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowP)"/>

  <!-- Step 4: Interceptor (전처리) -->
  <rect x="425" y="90" width="130" height="65" rx="8" fill="url(#nest-layer)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="490" y="110" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700">Interceptor</text>
  <text x="490" y="126" text-anchor="middle" fill="#f472b6" font-size="9">전처리</text>
  <text x="490" y="142" text-anchor="middle" fill="#94a3b8" font-size="9">RxJS Observable</text>

  <line x1="555" y1="122" x2="580" y2="122" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowP)"/>

  <!-- Step 5: Pipe -->
  <rect x="580" y="90" width="110" height="65" rx="8" fill="url(#nest-layer)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="635" y="112" text-anchor="middle" fill="#a78bfa" font-size="12" font-weight="700">Pipe</text>
  <text x="635" y="128" text-anchor="middle" fill="#94a3b8" font-size="9">ValidationPipe</text>
  <text x="635" y="142" text-anchor="middle" fill="#94a3b8" font-size="9">변환 + 검증</text>

  <line x1="690" y1="122" x2="715" y2="122" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowP)"/>

  <!-- Step 6: 핸들러 -->
  <rect x="715" y="90" width="120" height="65" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="2.5"/>
  <text x="775" y="115" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="700">핸들러</text>
  <text x="775" y="133" text-anchor="middle" fill="#94a3b8" font-size="9">@Get(), @Post()</text>
  <text x="775" y="147" text-anchor="middle" fill="#94a3b8" font-size="9">Controller 메서드</text>

  <!-- Return flow (bottom) -->
  <line x1="775" y1="155" x2="775" y2="210" stroke="#f472b6" stroke-width="2" marker-end="url(#arrowR)"/>

  <text x="850" y="192" fill="#f472b6" font-size="11" font-weight="600">응답</text>

  <!-- Step 7: Interceptor (후처리) -->
  <rect x="580" y="210" width="230" height="55" rx="8" fill="url(#nest-layer)" stroke="#f472b6" stroke-width="1.5"/>
  <text x="695" y="232" text-anchor="middle" fill="#f472b6" font-size="12" font-weight="700">Interceptor 후처리</text>
  <text x="695" y="250" text-anchor="middle" fill="#94a3b8" font-size="9">응답 변환, 캐싱, 로깅 — 메서드 → 컨트롤러 → 글로벌 순</text>

  <line x1="580" y1="237" x2="555" y2="237" stroke="#f472b6" stroke-width="2" marker-end="url(#arrowR)"/>

  <!-- Step 8: 응답 전송 -->
  <rect x="425" y="210" width="130" height="55" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="490" y="240" text-anchor="middle" fill="#e2e8f0" font-size="11" font-weight="600">응답 전송</text>

  <!-- Error flow -->
  <rect x="30" y="290" width="805" height="55" rx="8" fill="#1e1018" stroke="#ef4444" stroke-width="1" stroke-dasharray="5,3" opacity="0.8"/>
  <text x="50" y="315" fill="#ef4444" font-size="12" font-weight="700">Exception Filter</text>
  <text x="220" y="315" fill="#94a3b8" font-size="10">@Catch()로 에러 처리 — HttpException이 아닌 일반 Error를 throw하면 500으로 처리됨</text>
  <text x="50" y="335" fill="#94a3b8" font-size="10">Guard에서 false 반환 시 Interceptor, Pipe는 실행되지 않음 — 인증은 Guard에서 해야 한다</text>

  <!-- Execution order detail -->
  <rect x="30" y="365" width="805" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="50" y="387" fill="#f59e0b" font-size="11" font-weight="700">실행 순서 (고정)</text>
  <text x="50" y="405" fill="#94a3b8" font-size="10">글로벌 Guard → 컨트롤러 Guard → 메서드 Guard → 글로벌 Interceptor → 컨트롤러 Interceptor → 글로벌 Pipe → 컨트롤러 Pipe → 메서드 Pipe → 핸들러</text>
</svg>