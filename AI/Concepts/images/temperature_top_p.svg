<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 580" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="hd" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
  </defs>

  <rect width="780" height="580" rx="12" fill="#f8fafc"/>
  <rect x="0" y="0" width="780" height="48" rx="12" fill="url(#hd)"/>
  <rect x="0" y="36" width="780" height="12" fill="url(#hd)"/>
  <text x="390" y="32" text-anchor="middle" fill="white" font-size="17" font-weight="700">Temperature / Top-p에 따른 확률 분포 변화</text>

  <text x="390" y="72" text-anchor="middle" font-size="12" fill="#64748b">다음 토큰 후보: "서버가 요청을 ___"</text>

  <!-- Labels for all charts -->
  <!-- Chart 1: Temperature = 0.0 -->
  <rect x="30" y="90" width="350" height="210" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#sh)"/>
  <text x="205" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">Temperature = 0.0 (결정적)</text>
  <text x="205" y="127" text-anchor="middle" font-size="10" fill="#64748b">가장 높은 확률 토큰만 선택</text>

  <!-- Axis -->
  <line x1="70" y1="270" x2="350" y2="270" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="70" y1="140" x2="70" y2="270" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Bars -->
  <rect x="90" y="145" width="40" height="125" rx="3" fill="#3b82f6"/>
  <text x="110" y="140" text-anchor="middle" font-size="9" font-weight="700" fill="#1e40af">~100%</text>
  <text x="110" y="284" text-anchor="middle" font-size="9" fill="#475569">처리한다</text>

  <rect x="150" y="267" width="40" height="3" rx="2" fill="#93c5fd"/>
  <text x="170" y="284" text-anchor="middle" font-size="9" fill="#475569">전달한다</text>

  <rect x="210" y="268" width="40" height="2" rx="2" fill="#bfdbfe"/>
  <text x="230" y="284" text-anchor="middle" font-size="9" fill="#475569">받는다</text>

  <rect x="270" y="269" width="40" height="1" rx="1" fill="#dbeafe"/>
  <text x="290" y="284" text-anchor="middle" font-size="9" fill="#475569">분석한다</text>

  <!-- Chart 2: Temperature = 1.0 -->
  <rect x="405" y="90" width="350" height="210" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#sh)"/>
  <text x="580" y="112" text-anchor="middle" font-size="13" font-weight="700" fill="#16a34a">Temperature = 1.0 (기본값)</text>
  <text x="580" y="127" text-anchor="middle" font-size="10" fill="#64748b">원래 확률 분포 그대로</text>

  <line x1="445" y1="270" x2="725" y2="270" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="445" y1="140" x2="445" y2="270" stroke="#cbd5e1" stroke-width="1"/>

  <rect x="460" y="155" width="40" height="115" rx="3" fill="#22c55e"/>
  <text x="480" y="150" text-anchor="middle" font-size="9" font-weight="700" fill="#166534">45%</text>
  <text x="480" y="284" text-anchor="middle" font-size="9" fill="#475569">처리한다</text>

  <rect x="510" y="206" width="40" height="64" rx="3" fill="#4ade80"/>
  <text x="530" y="201" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">25%</text>
  <text x="530" y="284" text-anchor="middle" font-size="9" fill="#475569">전달한다</text>

  <rect x="560" y="232" width="40" height="38" rx="3" fill="#86efac"/>
  <text x="580" y="227" text-anchor="middle" font-size="9" font-weight="600" fill="#166534">15%</text>
  <text x="580" y="284" text-anchor="middle" font-size="9" fill="#475569">받는다</text>

  <rect x="610" y="250" width="40" height="20" rx="3" fill="#bbf7d0"/>
  <text x="630" y="245" text-anchor="middle" font-size="9" fill="#166534">8%</text>
  <text x="630" y="284" text-anchor="middle" font-size="9" fill="#475569">분석한다</text>

  <rect x="660" y="260" width="40" height="10" rx="3" fill="#dcfce7"/>
  <text x="680" y="255" text-anchor="middle" font-size="9" fill="#166534">4%</text>
  <text x="680" y="284" text-anchor="middle" font-size="9" fill="#475569">무시한다</text>

  <!-- Chart 3: Temperature = 2.0 -->
  <rect x="30" y="320" width="350" height="210" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#sh)"/>
  <text x="205" y="342" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">Temperature = 2.0 (평탄화)</text>
  <text x="205" y="357" text-anchor="middle" font-size="10" fill="#64748b">분포가 고르게 퍼짐 → 랜덤성 증가</text>

  <line x1="70" y1="500" x2="350" y2="500" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="70" y1="370" x2="70" y2="500" stroke="#cbd5e1" stroke-width="1"/>

  <rect x="85" y="436" width="36" height="64" rx="3" fill="#ef4444"/>
  <text x="103" y="431" text-anchor="middle" font-size="9" font-weight="600" fill="#991b1b">22%</text>
  <text x="103" y="514" text-anchor="middle" font-size="9" fill="#475569">처리한다</text>

  <rect x="130" y="446" width="36" height="54" rx="3" fill="#f87171"/>
  <text x="148" y="441" text-anchor="middle" font-size="9" font-weight="600" fill="#991b1b">19%</text>
  <text x="148" y="514" text-anchor="middle" font-size="9" fill="#475569">전달한다</text>

  <rect x="175" y="454" width="36" height="46" rx="3" fill="#fca5a5"/>
  <text x="193" y="449" text-anchor="middle" font-size="9" font-weight="600" fill="#991b1b">16%</text>
  <text x="193" y="514" text-anchor="middle" font-size="9" fill="#475569">받는다</text>

  <rect x="220" y="462" width="36" height="38" rx="3" fill="#fecaca"/>
  <text x="238" y="457" text-anchor="middle" font-size="9" font-weight="600" fill="#991b1b">14%</text>
  <text x="238" y="514" text-anchor="middle" font-size="9" fill="#475569">분석한다</text>

  <rect x="265" y="468" width="36" height="32" rx="3" fill="#fee2e2"/>
  <text x="283" y="463" text-anchor="middle" font-size="9" fill="#991b1b">12%</text>
  <text x="283" y="514" text-anchor="middle" font-size="9" fill="#475569">무시한다</text>

  <rect x="310" y="472" width="36" height="28" rx="3" fill="#fef2f2"/>
  <text x="328" y="467" text-anchor="middle" font-size="9" fill="#991b1b">10%</text>
  <text x="328" y="514" text-anchor="middle" font-size="9" fill="#475569">삭제한다</text>

  <!-- Chart 4: Top-p = 0.7 -->
  <rect x="405" y="320" width="350" height="210" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#sh)"/>
  <text x="580" y="342" text-anchor="middle" font-size="13" font-weight="700" fill="#9333ea">Top-p = 0.7 (누적 70%까지)</text>
  <text x="580" y="357" text-anchor="middle" font-size="10" fill="#64748b">확률 분포는 유지, 하위 토큰만 제거</text>

  <line x1="445" y1="500" x2="725" y2="500" stroke="#cbd5e1" stroke-width="1"/>
  <line x1="445" y1="370" x2="445" y2="500" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Active tokens -->
  <rect x="460" y="385" width="40" height="115" rx="3" fill="#8b5cf6"/>
  <text x="480" y="380" text-anchor="middle" font-size="9" font-weight="700" fill="#5b21b6">45%</text>
  <text x="480" y="514" text-anchor="middle" font-size="9" fill="#475569">처리한다</text>
  <text x="480" y="526" text-anchor="middle" font-size="8" fill="#7c3aed">누적 45%</text>

  <rect x="510" y="436" width="40" height="64" rx="3" fill="#a78bfa"/>
  <text x="530" y="431" text-anchor="middle" font-size="9" font-weight="600" fill="#5b21b6">25%</text>
  <text x="530" y="514" text-anchor="middle" font-size="9" fill="#475569">전달한다</text>
  <text x="530" y="526" text-anchor="middle" font-size="8" fill="#7c3aed">누적 70%</text>

  <!-- Cutoff line -->
  <line x1="555" y1="375" x2="555" y2="505" stroke="#ef4444" stroke-width="2" stroke-dasharray="5 3"/>
  <text x="560" y="390" font-size="10" font-weight="700" fill="#ef4444">컷오프</text>

  <!-- Excluded tokens (grayed out) -->
  <rect x="575" y="462" width="40" height="38" rx="3" fill="#e2e8f0" opacity="0.5"/>
  <text x="595" y="457" text-anchor="middle" font-size="9" fill="#94a3b8">15%</text>
  <text x="595" y="514" text-anchor="middle" font-size="9" fill="#94a3b8">받는다</text>
  <line x1="575" y1="462" x2="615" y2="500" stroke="#ef4444" stroke-width="1.5" opacity="0.5"/>

  <rect x="625" y="480" width="40" height="20" rx="3" fill="#e2e8f0" opacity="0.5"/>
  <text x="645" y="475" text-anchor="middle" font-size="9" fill="#94a3b8">8%</text>
  <text x="645" y="514" text-anchor="middle" font-size="9" fill="#94a3b8">분석한다</text>
  <line x1="625" y1="480" x2="665" y2="500" stroke="#ef4444" stroke-width="1.5" opacity="0.5"/>

  <rect x="675" y="490" width="40" height="10" rx="3" fill="#e2e8f0" opacity="0.5"/>
  <text x="695" y="485" text-anchor="middle" font-size="9" fill="#94a3b8">4%</text>
  <text x="695" y="514" text-anchor="middle" font-size="9" fill="#94a3b8">무시한다</text>
  <line x1="675" y1="490" x2="715" y2="500" stroke="#ef4444" stroke-width="1.5" opacity="0.5"/>

  <!-- Summary -->
  <rect x="30" y="545" width="720" height="28" rx="6" fill="#fefce8" stroke="#ca8a04" stroke-width="1"/>
  <text x="390" y="564" text-anchor="middle" font-size="11" font-weight="600" fill="#a16207">Temperature는 분포의 뾰족함을 조절 | Top-p는 분포를 유지하되 하위 토큰을 잘라냄 | 둘 중 하나만 조절하는 게 안전함</text>
</svg>