<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 650" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <marker id="arrW" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="white"/>
    </marker>
    <linearGradient id="hd" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/></filter>
  </defs>

  <rect width="780" height="650" rx="12" fill="#f8fafc"/>
  <rect x="0" y="0" width="780" height="48" rx="12" fill="url(#hd)"/>
  <rect x="0" y="36" width="780" height="12" fill="url(#hd)"/>
  <text x="390" y="32" text-anchor="middle" fill="white" font-size="17" font-weight="700">LLM 학습 파이프라인: Pre-training → SFT → RLHF/DPO</text>

  <!-- ===== STAGE 1: Pre-training ===== -->
  <rect x="30" y="65" width="720" height="170" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2" filter="url(#sh)"/>
  <rect x="30" y="65" width="720" height="36" rx="12" fill="#3b82f6"/>
  <rect x="30" y="89" width="720" height="12" fill="#3b82f6"/>
  <text x="390" y="88" text-anchor="middle" fill="white" font-size="15" font-weight="700">1단계: Pre-training (사전 학습)</text>

  <!-- Data -->
  <rect x="55" y="115" width="150" height="55" rx="8" fill="white" stroke="#93c5fd" stroke-width="1"/>
  <text x="130" y="138" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">학습 데이터</text>
  <text x="130" y="155" text-anchor="middle" font-size="10" fill="#3b82f6">웹 크롤링, 책, 코드</text>
  <text x="130" y="167" text-anchor="middle" font-size="10" fill="#3b82f6">수조(T) 토큰</text>

  <line x1="205" y1="142" x2="250" y2="142" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Objective -->
  <rect x="255" y="115" width="180" height="55" rx="8" fill="white" stroke="#93c5fd" stroke-width="1"/>
  <text x="345" y="135" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">학습 목표</text>
  <text x="345" y="152" text-anchor="middle" font-size="10" fill="#3b82f6">다음 토큰 예측</text>
  <text x="345" y="165" text-anchor="middle" font-size="10" fill="#3b82f6">Loss = -Σ log P(t_i | t_&lt;i)</text>

  <line x1="435" y1="142" x2="480" y2="142" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Result -->
  <rect x="485" y="115" width="245" height="55" rx="8" fill="white" stroke="#93c5fd" stroke-width="1"/>
  <text x="607" y="135" text-anchor="middle" font-size="12" font-weight="700" fill="#1e40af">Base Model</text>
  <text x="607" y="152" text-anchor="middle" font-size="10" fill="#3b82f6">언어 패턴, 사실, 추론 능력 습득</text>
  <text x="607" y="165" text-anchor="middle" font-size="10" fill="#ef4444">대화 형태 응답은 불가</text>

  <!-- Resources -->
  <text x="130" y="200" text-anchor="middle" font-size="10" fill="#64748b">수천 GPU</text>
  <text x="345" y="200" text-anchor="middle" font-size="10" fill="#64748b">수개월 소요</text>
  <text x="607" y="200" text-anchor="middle" font-size="10" fill="#64748b">수백억~수조 파라미터</text>
  <text x="345" y="218" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">비용: 수백만~수천만 달러</text>

  <!-- Arrow between stages -->
  <line x1="390" y1="235" x2="390" y2="268" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="420" y="256" font-size="11" font-weight="600" fill="#475569">가중치 전달</text>

  <!-- ===== STAGE 2: SFT ===== -->
  <rect x="30" y="272" width="720" height="155" rx="12" fill="#f0fdf4" stroke="#22c55e" stroke-width="2" filter="url(#sh)"/>
  <rect x="30" y="272" width="720" height="36" rx="12" fill="#22c55e"/>
  <rect x="30" y="296" width="720" height="12" fill="#22c55e"/>
  <text x="390" y="295" text-anchor="middle" fill="white" font-size="15" font-weight="700">2단계: SFT (Supervised Fine-Tuning)</text>

  <rect x="55" y="320" width="150" height="55" rx="8" fill="white" stroke="#86efac" stroke-width="1"/>
  <text x="130" y="340" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">학습 데이터</text>
  <text x="130" y="357" text-anchor="middle" font-size="10" fill="#16a34a">질문-답변 쌍</text>
  <text x="130" y="370" text-anchor="middle" font-size="10" fill="#16a34a">수만~수십만 건</text>

  <line x1="205" y1="347" x2="250" y2="347" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="255" y="320" width="180" height="55" rx="8" fill="white" stroke="#86efac" stroke-width="1"/>
  <text x="345" y="340" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">학습 목표</text>
  <text x="345" y="357" text-anchor="middle" font-size="10" fill="#16a34a">대화 형식 학습</text>
  <text x="345" y="370" text-anchor="middle" font-size="10" fill="#16a34a">[질문] → [답변] 패턴</text>

  <line x1="435" y1="347" x2="480" y2="347" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="485" y="320" width="245" height="55" rx="8" fill="white" stroke="#86efac" stroke-width="1"/>
  <text x="607" y="340" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">SFT Model</text>
  <text x="607" y="357" text-anchor="middle" font-size="10" fill="#16a34a">대화가 가능한 상태</text>
  <text x="607" y="370" text-anchor="middle" font-size="10" fill="#ef4444">품질 편차 큼, 안전성 부족</text>

  <text x="345" y="407" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">수일~수주 / 수십 GPU</text>

  <!-- Arrow -->
  <line x1="390" y1="427" x2="390" y2="460" stroke="#475569" stroke-width="2" marker-end="url(#arr)"/>
  <text x="420" y="448" font-size="11" font-weight="600" fill="#475569">가중치 전달</text>

  <!-- ===== STAGE 3: RLHF/DPO ===== -->
  <rect x="30" y="464" width="720" height="175" rx="12" fill="#fefce8" stroke="#ca8a04" stroke-width="2" filter="url(#sh)"/>
  <rect x="30" y="464" width="720" height="36" rx="12" fill="#ca8a04"/>
  <rect x="30" y="488" width="720" height="12" fill="#ca8a04"/>
  <text x="390" y="487" text-anchor="middle" fill="white" font-size="15" font-weight="700">3단계: RLHF / DPO (선호도 정렬)</text>

  <!-- RLHF path -->
  <rect x="55" y="510" width="320" height="70" rx="8" fill="white" stroke="#fbbf24" stroke-width="1"/>
  <text x="215" y="528" text-anchor="middle" font-size="12" font-weight="700" fill="#a16207">RLHF 방식</text>
  <text x="215" y="546" text-anchor="middle" font-size="10" fill="#ca8a04">1. 사람이 A/B 답변 비교 → 보상 모델 학습</text>
  <text x="215" y="560" text-anchor="middle" font-size="10" fill="#ca8a04">2. PPO로 보상 최대화 + KL 페널티</text>
  <text x="215" y="574" text-anchor="middle" font-size="10" fill="#ef4444">복잡, 불안정, 보상 해킹 위험</text>

  <!-- DPO path -->
  <rect x="400" y="510" width="330" height="70" rx="8" fill="white" stroke="#fbbf24" stroke-width="1"/>
  <text x="565" y="528" text-anchor="middle" font-size="12" font-weight="700" fill="#a16207">DPO 방식 (최근 주류)</text>
  <text x="565" y="546" text-anchor="middle" font-size="10" fill="#ca8a04">보상 모델 없이 선호 데이터에서 직접 학습</text>
  <text x="565" y="560" text-anchor="middle" font-size="10" fill="#ca8a04">chosen vs rejected 쌍으로 학습</text>
  <text x="565" y="574" text-anchor="middle" font-size="10" fill="#16a34a">구현 간단, 학습 안정적</text>

  <!-- Result -->
  <rect x="200" y="595" width="380" height="40" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#sh)"/>
  <text x="390" y="613" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Aligned Model</text>
  <text x="390" y="628" text-anchor="middle" font-size="10" fill="#a16207">안전하고 유용한 최종 모델 (GPT-4, Claude 등)</text>

  <line x1="215" y1="580" x2="300" y2="595" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="565" y1="580" x2="480" y2="595" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
</svg>