<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 560" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="hd" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
  </defs>

  <rect width="780" height="560" rx="12" fill="#f8fafc"/>
  <rect x="0" y="0" width="780" height="48" rx="12" fill="url(#hd)"/>
  <rect x="0" y="36" width="780" height="12" fill="url(#hd)"/>
  <text x="390" y="32" text-anchor="middle" fill="white" font-size="17" font-weight="700">임베딩 벡터 공간 (2D 축소 시각화)</text>

  <!-- Main plot area -->
  <rect x="40" y="65" width="480" height="440" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#sh)"/>

  <!-- Axes -->
  <line x1="80" y1="475" x2="490" y2="475" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="80" y1="475" x2="80" y2="85" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="290" y="498" text-anchor="middle" font-size="11" fill="#94a3b8">차원 1</text>
  <text x="55" y="280" text-anchor="middle" font-size="11" fill="#94a3b8" transform="rotate(-90, 55, 280)">차원 2</text>

  <!-- Cluster 1: Infrastructure / DevOps (blue) -->
  <ellipse cx="180" cy="160" rx="95" ry="65" fill="#dbeafe" fill-opacity="0.4" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4 2"/>

  <circle cx="150" cy="140" r="6" fill="#3b82f6"/>
  <text x="150" y="130" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">서버</text>

  <circle cx="200" cy="155" r="6" fill="#3b82f6"/>
  <text x="200" y="145" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">호스트</text>

  <circle cx="170" cy="180" r="6" fill="#60a5fa"/>
  <text x="170" y="198" text-anchor="middle" font-size="10" fill="#2563eb">배포</text>

  <circle cx="220" cy="175" r="6" fill="#60a5fa"/>
  <text x="220" y="193" text-anchor="middle" font-size="10" fill="#2563eb">릴리즈</text>

  <circle cx="140" cy="170" r="5" fill="#93c5fd"/>
  <text x="115" y="173" text-anchor="middle" font-size="9" fill="#3b82f6">인프라</text>

  <!-- Cluster 2: Programming (green) -->
  <ellipse cx="380" cy="170" rx="85" ry="70" fill="#dcfce7" fill-opacity="0.4" stroke="#22c55e" stroke-width="1" stroke-dasharray="4 2"/>

  <circle cx="360" cy="145" r="6" fill="#22c55e"/>
  <text x="360" y="135" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">함수</text>

  <circle cx="400" cy="155" r="6" fill="#22c55e"/>
  <text x="400" y="145" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">메서드</text>

  <circle cx="370" cy="190" r="6" fill="#4ade80"/>
  <text x="370" y="208" text-anchor="middle" font-size="10" fill="#16a34a">변수</text>

  <circle cx="410" cy="185" r="6" fill="#4ade80"/>
  <text x="410" y="203" text-anchor="middle" font-size="10" fill="#16a34a">파라미터</text>

  <circle cx="350" cy="175" r="5" fill="#86efac"/>
  <text x="325" y="178" text-anchor="middle" font-size="9" fill="#22c55e">클래스</text>

  <!-- Cluster 3: Food (orange) - far away -->
  <ellipse cx="420" cy="400" rx="60" ry="50" fill="#fff7ed" fill-opacity="0.4" stroke="#f97316" stroke-width="1" stroke-dasharray="4 2"/>

  <circle cx="400" cy="385" r="6" fill="#f97316"/>
  <text x="400" y="375" text-anchor="middle" font-size="10" font-weight="600" fill="#c2410c">바나나</text>

  <circle cx="440" cy="395" r="6" fill="#f97316"/>
  <text x="440" y="385" text-anchor="middle" font-size="10" font-weight="600" fill="#c2410c">사과</text>

  <circle cx="415" cy="425" r="5" fill="#fb923c"/>
  <text x="415" y="443" text-anchor="middle" font-size="9" fill="#ea580c">점심</text>

  <!-- Cluster 4: DB (purple) -->
  <ellipse cx="170" cy="370" rx="75" ry="55" fill="#ede9fe" fill-opacity="0.4" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4 2"/>

  <circle cx="150" cy="350" r="6" fill="#8b5cf6"/>
  <text x="150" y="340" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">쿼리</text>

  <circle cx="195" cy="360" r="6" fill="#8b5cf6"/>
  <text x="195" y="350" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">인덱스</text>

  <circle cx="160" cy="395" r="5" fill="#a78bfa"/>
  <text x="160" y="413" text-anchor="middle" font-size="9" fill="#7c3aed">테이블</text>

  <circle cx="200" cy="390" r="5" fill="#a78bfa"/>
  <text x="200" y="408" text-anchor="middle" font-size="9" fill="#7c3aed">트랜잭션</text>

  <!-- Distance annotations -->
  <!-- Short distance -->
  <line x1="156" y1="140" x2="194" y2="155" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="3 2"/>
  <rect x="155" y="138" width="50" height="16" rx="3" fill="#dbeafe"/>
  <text x="180" y="150" text-anchor="middle" font-size="8" font-weight="600" fill="#1e40af">cosine ≈ 0.92</text>

  <!-- Long distance -->
  <line x1="156" y1="148" x2="394" y2="380" stroke="#ef4444" stroke-width="1" stroke-dasharray="4 3" opacity="0.5"/>

  <!-- Legend / Info panel -->
  <rect x="540" y="65" width="220" height="440" rx="10" fill="white" stroke="#e2e8f0" stroke-width="1" filter="url(#sh)"/>
  <text x="650" y="92" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">벡터 공간의 특성</text>

  <!-- Similarity concept -->
  <rect x="555" y="108" width="190" height="80" rx="6" fill="#f0f9ff"/>
  <text x="650" y="128" text-anchor="middle" font-size="11" font-weight="700" fill="#1e40af">의미적 유사도</text>
  <text x="650" y="148" text-anchor="middle" font-size="10" fill="#3b82f6">"서버" ↔ "호스트"</text>
  <text x="650" y="162" text-anchor="middle" font-size="10" font-weight="600" fill="#16a34a">cosine ≈ 0.92 (가까움)</text>
  <text x="650" y="180" text-anchor="middle" font-size="10" fill="#3b82f6">"서버" ↔ "바나나"</text>
  <text x="650" y="194" text-anchor="middle" font-size="10" font-weight="600" fill="#ef4444">cosine ≈ 0.15 (멀다)</text>

  <!-- Dimension info -->
  <rect x="555" y="210" width="190" height="70" rx="6" fill="#fefce8"/>
  <text x="650" y="230" text-anchor="middle" font-size="11" font-weight="700" fill="#a16207">실제 차원 수</text>
  <text x="650" y="248" text-anchor="middle" font-size="10" fill="#ca8a04">text-embedding-3-small</text>
  <text x="650" y="262" text-anchor="middle" font-size="10" font-weight="600" fill="#a16207">→ 1,536차원</text>
  <text x="650" y="276" text-anchor="middle" font-size="9" fill="#64748b">(이 그림은 2D 축소 표현)</text>

  <!-- Use cases -->
  <rect x="555" y="295" width="190" height="100" rx="6" fill="#f0fdf4"/>
  <text x="650" y="315" text-anchor="middle" font-size="11" font-weight="700" fill="#166534">임베딩 활용</text>
  <text x="570" y="335" font-size="10" fill="#16a34a">- 유사 문서 검색 (RAG)</text>
  <text x="570" y="352" font-size="10" fill="#16a34a">- 텍스트 분류/클러스터링</text>
  <text x="570" y="369" font-size="10" fill="#16a34a">- 중복 탐지</text>
  <text x="570" y="386" font-size="10" fill="#16a34a">- 추천 시스템</text>

  <!-- Warning -->
  <rect x="555" y="408" width="190" height="85" rx="6" fill="#fef2f2"/>
  <text x="650" y="428" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">주의사항</text>
  <text x="570" y="448" font-size="9" fill="#b91c1c">임베딩 모델을 바꾸면</text>
  <text x="570" y="462" font-size="9" fill="#b91c1c">벡터 공간 자체가 달라짐</text>
  <text x="570" y="478" font-size="9" fill="#b91c1c">→ 전체 재인덱싱 필요</text>
  <text x="570" y="494" font-size="9" font-weight="600" fill="#b91c1c">처음에 모델을 잘 선택해야 함</text>

  <!-- Cluster labels -->
  <text x="180" y="108" text-anchor="middle" font-size="10" font-weight="600" fill="#1e40af">인프라/배포</text>
  <text x="380" y="112" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">프로그래밍</text>
  <text x="420" y="460" text-anchor="middle" font-size="10" font-weight="600" fill="#c2410c">음식</text>
  <text x="170" y="320" text-anchor="middle" font-size="10" font-weight="600" fill="#5b21b6">데이터베이스</text>
</svg>