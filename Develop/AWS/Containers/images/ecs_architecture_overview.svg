<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="1" dy="2" stdDeviation="2" flood-opacity="0.1"/>
    </filter>
    <linearGradient id="clusterBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fef3c7"/>
      <stop offset="100%" stop-color="#fde68a"/>
    </linearGradient>
    <linearGradient id="serviceBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dbeafe"/>
      <stop offset="100%" stop-color="#bfdbfe"/>
    </linearGradient>
    <linearGradient id="taskBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f9ff"/>
    </linearGradient>
    <linearGradient id="awsBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f3e8ff"/>
      <stop offset="100%" stop-color="#e9d5ff"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-size="18" font-weight="700" fill="#1e293b">ECS 아키텍처 전체 구조</text>

  <!-- Internet / User -->
  <rect x="370" y="55" width="160" height="40" rx="20" fill="#64748b" filter="url(#shadow)"/>
  <text x="450" y="80" text-anchor="middle" font-size="13" fill="#fff" font-weight="600">인터넷 / 사용자</text>

  <!-- Arrow: Internet → ALB -->
  <line x1="450" y1="95" x2="450" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrowGray)"/>
  <defs>
    <marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#94a3b8"/>
    </marker>
    <marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#3b82f6"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#8b5cf6"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- ALB -->
  <rect x="345" y="120" width="210" height="44" rx="8" fill="#7c3aed" filter="url(#shadow)"/>
  <text x="450" y="147" text-anchor="middle" font-size="13" fill="#fff" font-weight="600">ALB (Application Load Balancer)</text>

  <!-- Arrows: ALB → Services -->
  <line x1="400" y1="164" x2="250" y2="200" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="500" y1="164" x2="650" y2="200" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ECS Cluster -->
  <rect x="30" y="190" width="840" height="280" rx="10" fill="url(#clusterBg)" stroke="#f59e0b" stroke-width="2" filter="url(#shadow)"/>
  <text x="50" y="215" font-size="14" font-weight="700" fill="#92400e">ECS Cluster</text>

  <!-- Service A -->
  <rect x="50" y="230" width="380" height="220" rx="8" fill="url(#serviceBg)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="70" y="255" font-size="13" font-weight="600" fill="#1e40af">Service A — API 서버 (desired: 3)</text>

  <!-- Task A1 -->
  <rect x="70" y="270" width="160" height="80" rx="6" fill="url(#taskBg)" stroke="#93c5fd" stroke-width="1"/>
  <text x="150" y="292" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a5f">Task 1</text>
  <rect x="90" y="300" width="120" height="36" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="150" y="315" text-anchor="middle" font-size="10" fill="#1e40af">api:v2.1</text>
  <text x="150" y="329" text-anchor="middle" font-size="9" fill="#64748b">CPU: 512 / Mem: 1GB</text>

  <!-- Task A2 -->
  <rect x="250" y="270" width="160" height="80" rx="6" fill="url(#taskBg)" stroke="#93c5fd" stroke-width="1"/>
  <text x="330" y="292" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a5f">Task 2</text>
  <rect x="270" y="300" width="120" height="36" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="330" y="315" text-anchor="middle" font-size="10" fill="#1e40af">api:v2.1</text>
  <text x="330" y="329" text-anchor="middle" font-size="9" fill="#64748b">CPU: 512 / Mem: 1GB</text>

  <!-- Task A3 -->
  <rect x="160" y="365" width="160" height="80" rx="6" fill="url(#taskBg)" stroke="#93c5fd" stroke-width="1"/>
  <text x="240" y="387" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a5f">Task 3</text>
  <rect x="180" y="395" width="120" height="36" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="240" y="410" text-anchor="middle" font-size="10" fill="#1e40af">api:v2.1</text>
  <text x="240" y="424" text-anchor="middle" font-size="9" fill="#64748b">CPU: 512 / Mem: 1GB</text>

  <!-- Service B -->
  <rect x="470" y="230" width="380" height="220" rx="8" fill="url(#serviceBg)" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="490" y="255" font-size="13" font-weight="600" fill="#1e40af">Service B — Worker (desired: 2)</text>

  <!-- Task B1 -->
  <rect x="490" y="270" width="160" height="80" rx="6" fill="url(#taskBg)" stroke="#93c5fd" stroke-width="1"/>
  <text x="570" y="292" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a5f">Task 1</text>
  <rect x="510" y="300" width="120" height="36" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="570" y="315" text-anchor="middle" font-size="10" fill="#1e40af">worker:v1.8</text>
  <text x="570" y="329" text-anchor="middle" font-size="9" fill="#64748b">CPU: 1024 / Mem: 2GB</text>

  <!-- Task B2 -->
  <rect x="670" y="270" width="160" height="80" rx="6" fill="url(#taskBg)" stroke="#93c5fd" stroke-width="1"/>
  <text x="750" y="292" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a5f">Task 2</text>
  <rect x="690" y="300" width="120" height="36" rx="4" fill="#dbeafe" stroke="#93c5fd" stroke-width="0.5"/>
  <text x="750" y="315" text-anchor="middle" font-size="10" fill="#1e40af">worker:v1.8</text>
  <text x="750" y="329" text-anchor="middle" font-size="9" fill="#64748b">CPU: 1024 / Mem: 2GB</text>

  <!-- AWS Services Row -->
  <rect x="30" y="490" width="840" height="110" rx="10" fill="url(#awsBg)" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="50" y="515" font-size="14" font-weight="700" fill="#5b21b6">AWS 연동 서비스</text>

  <!-- ECR -->
  <rect x="50" y="525" width="130" height="55" rx="6" fill="#fff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="115" y="548" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">ECR</text>
  <text x="115" y="565" text-anchor="middle" font-size="9" fill="#64748b">컨테이너 이미지 저장소</text>

  <!-- IAM -->
  <rect x="200" y="525" width="130" height="55" rx="6" fill="#fff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="265" y="548" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">IAM Role</text>
  <text x="265" y="565" text-anchor="middle" font-size="9" fill="#64748b">태스크별 권한 제어</text>

  <!-- CloudWatch -->
  <rect x="350" y="525" width="130" height="55" rx="6" fill="#fff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="415" y="548" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">CloudWatch</text>
  <text x="415" y="565" text-anchor="middle" font-size="9" fill="#64748b">로그 / 메트릭 / 알람</text>

  <!-- Secrets Manager -->
  <rect x="500" y="525" width="130" height="55" rx="6" fill="#fff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="565" y="548" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">Secrets Mgr</text>
  <text x="565" y="565" text-anchor="middle" font-size="9" fill="#64748b">비밀 값 주입</text>

  <!-- Auto Scaling -->
  <rect x="650" y="525" width="200" height="55" rx="6" fill="#fff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="750" y="548" text-anchor="middle" font-size="12" font-weight="600" fill="#5b21b6">Application Auto Scaling</text>
  <text x="750" y="565" text-anchor="middle" font-size="9" fill="#64748b">태스크 수 자동 조절</text>

  <!-- Dashed arrows: Cluster → AWS services -->
  <line x1="150" y1="470" x2="115" y2="525" stroke="#8b5cf6" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>
  <line x1="300" y1="470" x2="265" y2="525" stroke="#8b5cf6" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>
  <line x1="450" y1="470" x2="415" y2="525" stroke="#8b5cf6" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>
  <line x1="600" y1="470" x2="565" y2="525" stroke="#8b5cf6" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>
  <line x1="750" y1="470" x2="750" y2="525" stroke="#8b5cf6" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>

  <!-- Task Definition labels -->
  <rect x="60" y="140" width="140" height="30" rx="5" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="130" y="160" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">Task Definition A</text>
  <line x1="130" y1="170" x2="150" y2="270" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowOrange)"/>

  <rect x="700" y="140" width="140" height="30" rx="5" fill="#f59e0b" filter="url(#shadow)"/>
  <text x="770" y="160" text-anchor="middle" font-size="11" fill="#fff" font-weight="600">Task Definition B</text>
  <line x1="770" y1="170" x2="750" y2="270" stroke="#f59e0b" stroke-width="1.2" stroke-dasharray="4,3" marker-end="url(#arrowOrange)"/>
</svg>