<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 680" font-family="Pretendard, -apple-system, sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#64748b"/>
    </marker>
    <marker id="arr-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#dc2626"/>
    </marker>
    <filter id="sh" x="-4%" y="-4%" width="108%" height="116%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="880" height="680" rx="12" fill="#f8fafc"/>

  <!-- Title -->
  <text x="440" y="32" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">ECS Task 실패 디버깅 플로우차트</text>

  <!-- Step 1: Start -->
  <rect x="340" y="52" width="200" height="44" rx="22" fill="#dc2626" filter="url(#sh)"/>
  <text x="440" y="79" text-anchor="middle" font-size="13" font-weight="600" fill="#fff">Task 실패 발생</text>

  <line x1="440" y1="96" x2="440" y2="118" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: Check stopped reason -->
  <rect x="310" y="120" width="260" height="50" rx="8" fill="#fff" stroke="#64748b" stroke-width="1.5" filter="url(#sh)"/>
  <text x="440" y="143" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">1단계: stopped reason 확인</text>
  <text x="440" y="160" text-anchor="middle" font-size="10" fill="#78716c">aws ecs describe-tasks</text>

  <line x1="440" y1="170" x2="440" y2="198" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Decision diamond -->
  <polygon points="440,200 560,240 440,280 320,240" fill="#1e293b" stroke="#1e293b" stroke-width="1"/>
  <text x="440" y="244" text-anchor="middle" font-size="11" font-weight="600" fill="#fff">에러 유형 분기</text>

  <!-- Branch 1: CannotPullContainerError (left) -->
  <line x1="320" y1="240" x2="140" y2="240" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="230" y="232" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="600">CannotPullContainerError</text>

  <rect x="20" y="260" width="240" height="36" rx="6" fill="#fff7ed" stroke="#f4a261" stroke-width="1.5"/>
  <text x="140" y="283" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412">Execution Role - ECR 점검</text>

  <rect x="20" y="306" width="240" height="30" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="36" y="325" font-size="10" fill="#475569">1. executionRoleArn 지정 여부</text>

  <rect x="20" y="342" width="240" height="30" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="36" y="361" font-size="10" fill="#475569">2. ECR 권한 정책 확인</text>

  <rect x="20" y="378" width="240" height="30" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="36" y="397" font-size="10" fill="#475569">3. 이미지 URI 오타 확인</text>

  <rect x="20" y="414" width="240" height="30" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="36" y="433" font-size="10" fill="#475569">4. VPC 엔드포인트 확인 (Private)</text>

  <!-- Arrows connecting steps -->
  <line x1="140" y1="296" x2="140" y2="302" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="140" y1="336" x2="140" y2="338" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="140" y1="372" x2="140" y2="374" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="140" y1="408" x2="140" y2="410" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Branch 2: ResourceInitializationError (center-left) -->
  <line x1="380" y1="280" x2="340" y2="310" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="320" y="296" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="600">ResourceInitializationError</text>

  <rect x="280" y="316" width="230" height="36" rx="6" fill="#fff7ed" stroke="#f4a261" stroke-width="1.5"/>
  <text x="395" y="339" text-anchor="middle" font-size="11" font-weight="600" fill="#9a3412">Execution Role - 시크릿 점검</text>

  <rect x="280" y="362" width="230" height="30" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="296" y="381" font-size="10" fill="#475569">1. secretsmanager/ssm 권한</text>

  <rect x="280" y="398" width="230" height="30" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="296" y="417" font-size="10" fill="#475569">2. 시크릿 ARN 정확성</text>

  <rect x="280" y="434" width="230" height="30" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="296" y="453" font-size="10" fill="#475569">3. KMS Decrypt 권한 (커스텀 키)</text>

  <rect x="280" y="470" width="230" height="30" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="296" y="489" font-size="10" fill="#475569">4. VPC 엔드포인트 확인</text>

  <!-- Branch 3: exitCode != 0 (center-right) -->
  <line x1="500" y1="280" x2="560" y2="310" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="565" y="296" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="600">exitCode != 0</text>

  <rect x="530" y="316" width="200" height="36" rx="6" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="630" y="339" text-anchor="middle" font-size="11" font-weight="600" fill="#1e40af">CloudWatch Logs 확인</text>

  <rect x="530" y="362" width="200" height="30" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="546" y="381" font-size="10" fill="#475569">1. 로그 그룹/스트림 확인</text>

  <rect x="530" y="398" width="200" height="30" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="546" y="417" font-size="10" fill="#475569">2. 애플리케이션 에러 분석</text>

  <rect x="530" y="434" width="200" height="30" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="546" y="453" font-size="10" fill="#475569">3. 컨테이너 환경 변수 점검</text>

  <!-- Branch 4: AccessDenied (right) -->
  <line x1="560" y1="240" x2="750" y2="240" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="660" y="232" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="600">AccessDenied</text>

  <rect x="630" y="260" width="230" height="36" rx="6" fill="#e0f5f0" stroke="#2a9d8f" stroke-width="1.5"/>
  <text x="745" y="283" text-anchor="middle" font-size="11" font-weight="600" fill="#115e59">Task Role 점검</text>

  <rect x="630" y="306" width="230" height="30" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="646" y="325" font-size="10" fill="#475569">1. taskRoleArn 지정 여부</text>

  <rect x="630" y="342" width="230" height="30" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="646" y="361" font-size="10" fill="#475569">2. Action / Resource 범위 확인</text>

  <rect x="630" y="378" width="230" height="30" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="646" y="397" font-size="10" fill="#475569">3. Trust Policy Principal 확인</text>

  <rect x="630" y="414" width="230" height="40" rx="4" fill="#fefce8" stroke="#fde047" stroke-width="1"/>
  <text x="646" y="433" font-size="10" fill="#854d0e">IAM Policy Simulator로</text>
  <text x="646" y="447" font-size="10" fill="#854d0e">권한 시뮬레이션 검증</text>

  <!-- Bottom: common resolution -->
  <rect x="180" y="530" width="520" height="60" rx="8" fill="#fff" stroke="#cbd5e1" stroke-width="1.5" filter="url(#sh)"/>
  <text x="440" y="554" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">3단계: IAM Policy Simulator로 검증</text>
  <text x="440" y="572" text-anchor="middle" font-size="10" fill="#64748b">aws iam simulate-principal-policy --policy-source-arn ROLE_ARN --action-names ACTION</text>

  <line x1="140" y1="444" x2="140" y2="520" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="140" y1="520" x2="180" y2="550" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <line x1="395" y1="500" x2="395" y2="526" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <line x1="745" y1="454" x2="745" y2="520" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3"/>
  <line x1="745" y1="520" x2="700" y2="550" stroke="#94a3b8" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr)"/>

  <!-- Legend at bottom -->
  <rect x="180" y="610" width="520" height="52" rx="6" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="200" y="628" width="12" height="12" rx="2" fill="#fff7ed" stroke="#f4a261" stroke-width="1"/>
  <text x="220" y="639" font-size="10" fill="#57534e">Execution Role 문제 (컨테이너 기동 단계)</text>
  <rect x="460" y="628" width="12" height="12" rx="2" fill="#e0f5f0" stroke="#2a9d8f" stroke-width="1"/>
  <text x="480" y="639" font-size="10" fill="#57534e">Task Role 문제 (런타임 단계)</text>
  <rect x="200" y="646" width="12" height="12" rx="2" fill="#eff6ff" stroke="#60a5fa" stroke-width="1"/>
  <text x="220" y="657" font-size="10" fill="#57534e">애플리케이션 문제</text>
</svg>