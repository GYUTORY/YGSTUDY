<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="step-green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#065f46"/>
      <stop offset="100%" stop-color="#064e3b"/>
    </linearGradient>
    <linearGradient id="arrow-green" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
  </defs>

  <rect width="900" height="400" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#34d399" font-size="17" font-weight="700">Express 요청 라이프사이클</text>
  <text x="450" y="55" text-anchor="middle" fill="#64748b" font-size="11">미들웨어 스택을 순서대로 거치는 선형(linear) 구조 — next() 호출 필수</text>

  <!-- Main flow: horizontal steps -->
  <!-- Step 1: 요청 수신 -->
  <rect x="30" y="90" width="120" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="90" y="112" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">요청 수신</text>
  <text x="90" y="128" text-anchor="middle" fill="#64748b" font-size="9">HTTP Request</text>

  <!-- Arrow -->
  <line x1="150" y1="115" x2="180" y2="115" stroke="#34d399" stroke-width="2" marker-end="url(#arrowG)"/>
  <defs><marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399"/></marker></defs>

  <!-- Step 2: 글로벌 미들웨어 -->
  <rect x="180" y="80" width="140" height="70" rx="8" fill="url(#step-green)" stroke="#34d399" stroke-width="1.5"/>
  <text x="250" y="105" text-anchor="middle" fill="#34d399" font-size="12" font-weight="600">글로벌 미들웨어</text>
  <text x="250" y="122" text-anchor="middle" fill="#94a3b8" font-size="10">body-parser</text>
  <text x="250" y="136" text-anchor="middle" fill="#94a3b8" font-size="10">cors, helmet, ...</text>

  <line x1="320" y1="115" x2="350" y2="115" stroke="#34d399" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Step 3: 라우트 매칭 -->
  <rect x="350" y="80" width="140" height="70" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="420" y="105" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">라우트 매칭</text>
  <text x="420" y="122" text-anchor="middle" fill="#f59e0b" font-size="10">선형 탐색 O(n)</text>
  <text x="420" y="136" text-anchor="middle" fill="#94a3b8" font-size="10">등록 순서대로 순회</text>

  <line x1="490" y1="115" x2="520" y2="115" stroke="#34d399" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Step 4: 라우트 미들웨어 -->
  <rect x="520" y="80" width="140" height="70" rx="8" fill="url(#step-green)" stroke="#34d399" stroke-width="1.5"/>
  <text x="590" y="105" text-anchor="middle" fill="#34d399" font-size="12" font-weight="600">라우트 미들웨어</text>
  <text x="590" y="122" text-anchor="middle" fill="#94a3b8" font-size="10">router.use()</text>
  <text x="590" y="136" text-anchor="middle" fill="#94a3b8" font-size="10">특정 라우터에 적용</text>

  <line x1="660" y1="115" x2="690" y2="115" stroke="#34d399" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Step 5: 핸들러 -->
  <rect x="690" y="80" width="120" height="70" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <text x="750" y="108" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="700">핸들러</text>
  <text x="750" y="126" text-anchor="middle" fill="#94a3b8" font-size="10">(req, res) =></text>
  <text x="750" y="140" text-anchor="middle" fill="#94a3b8" font-size="10">res.json()</text>

  <!-- Down arrow to response -->
  <line x1="750" y1="150" x2="750" y2="185" stroke="#34d399" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Step 6: 응답 전송 -->
  <rect x="690" y="185" width="120" height="45" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="750" y="212" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">응답 전송</text>

  <!-- Error flow -->
  <rect x="180" y="270" width="630" height="105" rx="10" fill="#1e1018" stroke="#ef4444" stroke-width="1" stroke-dasharray="5,3" opacity="0.8"/>
  <text x="200" y="295" fill="#ef4444" font-size="13" font-weight="700">에러 발생 시</text>

  <!-- Error middleware -->
  <rect x="200" y="310" width="240" height="50" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="1.2"/>
  <text x="320" y="332" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">에러 미들웨어 (인자 4개)</text>
  <text x="320" y="348" text-anchor="middle" fill="#94a3b8" font-size="10">(err, req, res, next) => { ... }</text>

  <!-- Note about next(err) -->
  <text x="480" y="330" fill="#f59e0b" font-size="11" font-weight="600">next(err) 호출 시 점프</text>
  <text x="480" y="348" fill="#94a3b8" font-size="10">next() 빠뜨리면 요청이 멈춤</text>

  <!-- Key characteristics -->
  <rect x="30" y="200" width="230" height="55" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="145" y="220" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="600">핵심 특성</text>
  <text x="145" y="238" text-anchor="middle" fill="#94a3b8" font-size="10">등록 순서 = 실행 순서</text>
  <text x="145" y="250" text-anchor="middle" fill="#94a3b8" font-size="10">미들웨어마다 next() 호출 필수</text>
</svg>