<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f1a"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <marker id="arrowG" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ef4444"/>
    </marker>
    <marker id="arrowY" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="900" height="420" fill="url(#bg)" rx="12"/>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" fill="#34d399" font-size="17" font-weight="700">Express 에러 전파 흐름</text>
  <text x="450" y="55" text-anchor="middle" fill="#64748b" font-size="11">next(error) 호출로 에러 미들웨어까지 수동 전파 — Express 4에서는 async 에러를 직접 잡아야 한다</text>

  <!-- Normal flow (top row) -->
  <!-- Step 1: 요청 -->
  <rect x="30" y="90" width="110" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="85" y="112" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">클라이언트 요청</text>
  <text x="85" y="128" text-anchor="middle" fill="#64748b" font-size="9">HTTP Request</text>

  <line x1="140" y1="115" x2="170" y2="115" stroke="#34d399" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Step 2: bodyParser -->
  <rect x="170" y="85" width="120" height="60" rx="8" fill="#065f46" stroke="#34d399" stroke-width="1.5"/>
  <text x="230" y="108" text-anchor="middle" fill="#34d399" font-size="11" font-weight="600">미들웨어 1</text>
  <text x="230" y="124" text-anchor="middle" fill="#94a3b8" font-size="10">bodyParser</text>
  <text x="230" y="138" text-anchor="middle" fill="#94a3b8" font-size="10">cors, helmet</text>

  <line x1="290" y1="115" x2="320" y2="115" stroke="#34d399" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Step 3: Auth -->
  <rect x="320" y="85" width="120" height="60" rx="8" fill="#065f46" stroke="#34d399" stroke-width="1.5"/>
  <text x="380" y="108" text-anchor="middle" fill="#34d399" font-size="11" font-weight="600">미들웨어 2</text>
  <text x="380" y="124" text-anchor="middle" fill="#94a3b8" font-size="10">인증/인가</text>

  <line x1="440" y1="115" x2="470" y2="115" stroke="#34d399" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Step 4: Route Handler -->
  <rect x="470" y="85" width="140" height="60" rx="8" fill="#1e293b" stroke="#34d399" stroke-width="2"/>
  <text x="540" y="108" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="700">라우트 핸들러</text>
  <text x="540" y="126" text-anchor="middle" fill="#94a3b8" font-size="10">async (req, res, next)</text>

  <!-- Normal response arrow -->
  <line x1="610" y1="115" x2="660" y2="115" stroke="#34d399" stroke-width="2" marker-end="url(#arrowG)"/>

  <!-- Step 5: Response -->
  <rect x="660" y="90" width="110" height="50" rx="8" fill="#1e293b" stroke="#475569" stroke-width="1.5"/>
  <text x="715" y="112" text-anchor="middle" fill="#e2e8f0" font-size="12" font-weight="600">res.json()</text>
  <text x="715" y="128" text-anchor="middle" fill="#64748b" font-size="9">정상 응답</text>

  <!-- Normal flow label -->
  <rect x="795" y="95" width="80" height="30" rx="4" fill="#065f46" stroke="#34d399" stroke-width="1"/>
  <text x="835" y="115" text-anchor="middle" fill="#34d399" font-size="10" font-weight="600">정상 흐름</text>

  <!-- Error flow section -->
  <rect x="30" y="175" width="840" height="220" rx="10" fill="#1e1018" stroke="#ef4444" stroke-width="1" stroke-dasharray="5,3" opacity="0.7"/>
  <text x="50" y="198" fill="#ef4444" font-size="13" font-weight="700">에러 발생 시</text>

  <!-- Error from auth middleware -->
  <rect x="50" y="215" width="180" height="45" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="140" y="235" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">인증 실패</text>
  <text x="140" y="250" text-anchor="middle" fill="#94a3b8" font-size="9">next(new UnauthorizedError())</text>

  <!-- Error from handler -->
  <rect x="260" y="215" width="180" height="45" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="350" y="235" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="600">핸들러 에러</text>
  <text x="350" y="250" text-anchor="middle" fill="#94a3b8" font-size="9">try/catch → next(error)</text>

  <!-- Arrow from auth to error middleware -->
  <line x1="230" y1="237" x2="500" y2="310" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowR)"/>

  <!-- Arrow from handler error to error middleware -->
  <line x1="440" y1="247" x2="500" y2="310" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowR)"/>

  <!-- Error middleware (4 params) -->
  <rect x="500" y="290" width="240" height="55" rx="8" fill="#1e293b" stroke="#ef4444" stroke-width="2"/>
  <text x="620" y="312" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="700">에러 미들웨어 (인자 4개)</text>
  <text x="620" y="330" text-anchor="middle" fill="#94a3b8" font-size="10">(err, req, res, next) => { ... }</text>

  <!-- Arrow to error response -->
  <line x1="740" y1="317" x2="770" y2="317" stroke="#ef4444" stroke-width="2" marker-end="url(#arrowR)"/>

  <!-- Error response -->
  <rect x="770" y="295" width="85" height="45" rx="6" fill="#1e293b" stroke="#ef4444" stroke-width="1.2"/>
  <text x="812" y="315" text-anchor="middle" fill="#fca5a5" font-size="11" font-weight="600">에러 응답</text>
  <text x="812" y="330" text-anchor="middle" fill="#94a3b8" font-size="9">4xx / 5xx</text>

  <!-- Warning box -->
  <rect x="50" y="280" width="200" height="55" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.2"/>
  <text x="150" y="300" text-anchor="middle" fill="#f59e0b" font-size="11" font-weight="600">주의: Express 4</text>
  <text x="150" y="316" text-anchor="middle" fill="#94a3b8" font-size="10">async 에러 자동 전파 안 됨</text>
  <text x="150" y="330" text-anchor="middle" fill="#94a3b8" font-size="10">asyncHandler 래퍼 필수</text>

  <!-- 404 handler note -->
  <rect x="50" y="350" width="200" height="35" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="150" y="372" text-anchor="middle" fill="#94a3b8" font-size="10">라우트 미매칭 → 404 핸들러</text>
</svg>