<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 860" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569"/>
    </marker>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.1"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="860" rx="12" fill="#f8fafc"/>
  <rect x="0" y="0" width="720" height="52" rx="12" fill="url(#headerGrad)"/>
  <rect x="0" y="40" width="720" height="12" fill="url(#headerGrad)"/>
  <text x="360" y="34" text-anchor="middle" fill="white" font-size="18" font-weight="700">Decoder-Only Transformer 구조 (GPT, Claude)</text>

  <!-- Input -->
  <rect x="240" y="75" width="240" height="44" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="360" y="102" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">입력 토큰 시퀀스</text>

  <!-- Arrow -->
  <line x1="360" y1="119" x2="360" y2="145" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Token Embedding -->
  <rect x="200" y="148" width="320" height="50" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="360" y="170" text-anchor="middle" font-size="13" font-weight="600" fill="#4338ca">Token Embedding</text>
  <text x="360" y="188" text-anchor="middle" font-size="11" fill="#6366f1">토큰 ID → d차원 벡터</text>

  <!-- Arrow -->
  <line x1="360" y1="198" x2="360" y2="218" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Positional Encoding -->
  <rect x="200" y="221" width="320" height="50" rx="8" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="360" y="243" text-anchor="middle" font-size="13" font-weight="600" fill="#4338ca">Positional Encoding</text>
  <text x="360" y="261" text-anchor="middle" font-size="11" fill="#6366f1">위치 정보를 벡터에 더함</text>

  <!-- Arrow -->
  <line x1="360" y1="271" x2="360" y2="295" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Decoder Block (big box) -->
  <rect x="80" y="298" width="560" height="380" rx="12" fill="#fefce8" stroke="#ca8a04" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="100" y="322" font-size="14" font-weight="700" fill="#a16207">Decoder Block  x N layers (GPT-4: 120+)</text>

  <!-- Masked Self-Attention -->
  <rect x="160" y="340" width="400" height="64" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="360" y="365" text-anchor="middle" font-size="14" font-weight="700" fill="#92400e">Masked Multi-Head Self-Attention</text>
  <text x="360" y="385" text-anchor="middle" font-size="11" fill="#a16207">각 토큰이 이전 토큰들만 참조 (미래 토큰 차단)</text>

  <!-- Residual + LayerNorm 1 -->
  <line x1="360" y1="404" x2="360" y2="420" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="220" y="423" width="280" height="36" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.2"/>
  <text x="360" y="446" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">Add &amp; Layer Normalization</text>

  <!-- Residual arrow 1 -->
  <path d="M 145 372 L 145 441 L 220 441" fill="none" stroke="#22c55e" stroke-width="1.2" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
  <text x="120" y="408" text-anchor="middle" font-size="10" fill="#22c55e" transform="rotate(-90, 120, 408)">잔차 연결</text>

  <!-- Arrow -->
  <line x1="360" y1="459" x2="360" y2="480" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- FFN -->
  <rect x="160" y="483" width="400" height="64" rx="8" fill="#fce4ec" stroke="#e91e63" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="360" y="508" text-anchor="middle" font-size="14" font-weight="700" fill="#880e4f">Feed-Forward Network (FFN)</text>
  <text x="360" y="528" text-anchor="middle" font-size="11" fill="#ad1457">Linear → GELU → Linear (d_model → 4*d_model → d_model)</text>

  <!-- Residual + LayerNorm 2 -->
  <line x1="360" y1="547" x2="360" y2="563" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="220" y="566" width="280" height="36" rx="6" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.2"/>
  <text x="360" y="589" text-anchor="middle" font-size="12" font-weight="600" fill="#166534">Add &amp; Layer Normalization</text>

  <!-- Residual arrow 2 -->
  <path d="M 145 515 L 145 584 L 220 584" fill="none" stroke="#22c55e" stroke-width="1.2" stroke-dasharray="4 2" marker-end="url(#arrow)"/>
  <text x="120" y="551" text-anchor="middle" font-size="10" fill="#22c55e" transform="rotate(-90, 120, 551)">잔차 연결</text>

  <!-- Repeat indicator -->
  <path d="M 580 580 Q 620 580 620 440 Q 620 330 580 330" fill="none" stroke="#ca8a04" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrow)"/>
  <text x="645" y="460" text-anchor="middle" font-size="11" font-weight="600" fill="#a16207" transform="rotate(90, 645, 460)">N번 반복</text>

  <!-- Arrow out of decoder block -->
  <line x1="360" y1="678" x2="360" y2="705" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Linear Layer -->
  <rect x="220" y="708" width="280" height="42" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="360" y="734" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6">Linear Projection (→ vocab size)</text>

  <!-- Arrow -->
  <line x1="360" y1="750" x2="360" y2="770" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Softmax -->
  <rect x="220" y="773" width="280" height="42" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="360" y="799" text-anchor="middle" font-size="13" font-weight="600" fill="#5b21b6">Softmax → 확률 분포</text>

  <!-- Arrow -->
  <line x1="360" y1="815" x2="360" y2="830" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Output -->
  <rect x="240" y="833" width="240" height="20" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.2"/>
  <text x="360" y="848" text-anchor="middle" font-size="12" font-weight="600" fill="#1e40af">다음 토큰 선택</text>
</svg>