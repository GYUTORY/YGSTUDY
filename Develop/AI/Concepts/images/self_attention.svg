<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 620" font-family="'Pretendard', 'Noto Sans KR', sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#475569"/>
    </marker>
    <linearGradient id="hd" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity="0.08"/></filter>
  </defs>

  <rect width="780" height="620" rx="12" fill="#f8fafc"/>
  <rect x="0" y="0" width="780" height="48" rx="12" fill="url(#hd)"/>
  <rect x="0" y="36" width="780" height="12" fill="url(#hd)"/>
  <text x="390" y="32" text-anchor="middle" fill="white" font-size="17" font-weight="700">Self-Attention 연산 흐름</text>

  <!-- Input X -->
  <rect x="30" y="75" width="140" height="110" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5" filter="url(#sh)"/>
  <text x="100" y="98" text-anchor="middle" font-size="13" font-weight="700" fill="#1e40af">입력 X</text>
  <text x="100" y="118" text-anchor="middle" font-size="11" fill="#3b82f6">[seq_len × d_model]</text>
  <text x="100" y="140" text-anchor="middle" font-size="10" fill="#64748b">"서버가"  [0.2, -0.1, ...]</text>
  <text x="100" y="155" text-anchor="middle" font-size="10" fill="#64748b">"요청을"  [0.5, 0.3, ...]</text>
  <text x="100" y="170" text-anchor="middle" font-size="10" fill="#64748b">"처리한다" [-0.1, 0.7, ...]</text>

  <!-- Three projection arrows -->
  <line x1="170" y1="105" x2="230" y2="85" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="170" y1="130" x2="230" y2="130" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="170" y1="155" x2="230" y2="175" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>

  <!-- Weight matrices labels -->
  <text x="200" y="80" text-anchor="middle" font-size="10" fill="#475569">W_Q</text>
  <text x="200" y="125" text-anchor="middle" font-size="10" fill="#475569">W_K</text>
  <text x="200" y="175" text-anchor="middle" font-size="10" fill="#475569">W_V</text>

  <!-- Q -->
  <rect x="235" y="65" width="110" height="42" rx="6" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5" filter="url(#sh)"/>
  <text x="290" y="84" text-anchor="middle" font-size="13" font-weight="700" fill="#92400e">Q (Query)</text>
  <text x="290" y="100" text-anchor="middle" font-size="10" fill="#a16207">"무엇을 찾는가"</text>

  <!-- K -->
  <rect x="235" y="115" width="110" height="42" rx="6" fill="#d1fae5" stroke="#10b981" stroke-width="1.5" filter="url(#sh)"/>
  <text x="290" y="134" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">K (Key)</text>
  <text x="290" y="150" text-anchor="middle" font-size="10" fill="#047857">"무엇을 제공하는가"</text>

  <!-- V -->
  <rect x="235" y="165" width="110" height="42" rx="6" fill="#e0e7ff" stroke="#6366f1" stroke-width="1.5" filter="url(#sh)"/>
  <text x="290" y="184" text-anchor="middle" font-size="13" font-weight="700" fill="#3730a3">V (Value)</text>
  <text x="290" y="200" text-anchor="middle" font-size="10" fill="#4f46e5">"전달할 정보"</text>

  <!-- QK^T -->
  <line x1="345" y1="86" x2="400" y2="106" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="345" y1="136" x2="400" y2="116" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>

  <rect x="405" y="88" width="150" height="50" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="1.5" filter="url(#sh)"/>
  <text x="480" y="110" text-anchor="middle" font-size="12" font-weight="700" fill="#c2410c">QK^T 행렬 곱</text>
  <text x="480" y="128" text-anchor="middle" font-size="10" fill="#ea580c">유사도 점수 계산</text>

  <!-- Scale -->
  <line x1="555" y1="113" x2="600" y2="113" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="605" y="88" width="140" height="50" rx="6" fill="#fff7ed" stroke="#f97316" stroke-width="1.5" filter="url(#sh)"/>
  <text x="675" y="108" text-anchor="middle" font-size="12" font-weight="700" fill="#c2410c">÷ √d_k</text>
  <text x="675" y="128" text-anchor="middle" font-size="10" fill="#ea580c">스케일링 (안 하면</text>
  <text x="675" y="140" text-anchor="middle" font-size="9" fill="#ea580c">softmax 포화)</text>

  <!-- Mask -->
  <line x1="675" y1="138" x2="675" y2="175" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="605" y="178" width="140" height="50" rx="6" fill="#fce4ec" stroke="#e91e63" stroke-width="1.5" filter="url(#sh)"/>
  <text x="675" y="198" text-anchor="middle" font-size="12" font-weight="700" fill="#880e4f">Causal Mask</text>
  <text x="675" y="218" text-anchor="middle" font-size="10" fill="#ad1457">미래 토큰 → -∞</text>

  <!-- Softmax -->
  <line x1="675" y1="228" x2="675" y2="262" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <rect x="605" y="265" width="140" height="50" rx="6" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5" filter="url(#sh)"/>
  <text x="675" y="285" text-anchor="middle" font-size="12" font-weight="700" fill="#5b21b6">Softmax</text>
  <text x="675" y="303" text-anchor="middle" font-size="10" fill="#7c3aed">→ Attention 가중치</text>

  <!-- Attention Score Matrix -->
  <rect x="80" y="260" width="460" height="170" rx="10" fill="white" stroke="#cbd5e1" stroke-width="1"/>
  <text x="310" y="282" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Attention 가중치 행렬 (Softmax 적용 후)</text>

  <!-- Matrix grid -->
  <text x="210" y="305" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">서버가</text>
  <text x="310" y="305" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">요청을</text>
  <text x="410" y="305" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">처리한다</text>

  <text x="130" y="335" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">서버가</text>
  <text x="130" y="365" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">요청을</text>
  <text x="130" y="395" text-anchor="middle" font-size="10" font-weight="600" fill="#64748b">처리한다</text>

  <!-- Attention values -->
  <rect x="175" y="315" width="70" height="28" rx="4" fill="#c7d2fe"/>
  <text x="210" y="334" text-anchor="middle" font-size="12" font-weight="600" fill="#3730a3">1.00</text>

  <rect x="275" y="315" width="70" height="28" rx="4" fill="#f1f5f9"/>
  <text x="310" y="334" text-anchor="middle" font-size="12" fill="#94a3b8">0.00</text>

  <rect x="375" y="315" width="70" height="28" rx="4" fill="#f1f5f9"/>
  <text x="410" y="334" text-anchor="middle" font-size="12" fill="#94a3b8">0.00</text>

  <rect x="175" y="348" width="70" height="28" rx="4" fill="#e0e7ff"/>
  <text x="210" y="367" text-anchor="middle" font-size="12" font-weight="600" fill="#4338ca">0.40</text>

  <rect x="275" y="348" width="70" height="28" rx="4" fill="#c7d2fe"/>
  <text x="310" y="367" text-anchor="middle" font-size="12" font-weight="600" fill="#3730a3">0.60</text>

  <rect x="375" y="348" width="70" height="28" rx="4" fill="#f1f5f9"/>
  <text x="410" y="367" text-anchor="middle" font-size="12" fill="#94a3b8">0.00</text>

  <rect x="175" y="381" width="70" height="28" rx="4" fill="#e0e7ff"/>
  <text x="210" y="400" text-anchor="middle" font-size="12" font-weight="600" fill="#4338ca">0.35</text>

  <rect x="275" y="381" width="70" height="28" rx="4" fill="#c7d2fe"/>
  <text x="310" y="400" text-anchor="middle" font-size="12" font-weight="600" fill="#3730a3">0.45</text>

  <rect x="375" y="381" width="70" height="28" rx="4" fill="#e0e7ff"/>
  <text x="410" y="400" text-anchor="middle" font-size="12" font-weight="600" fill="#4338ca">0.20</text>

  <!-- Mask note -->
  <rect x="470" y="318" width="58" height="22" rx="4" fill="#fce4ec"/>
  <text x="499" y="334" text-anchor="middle" font-size="10" fill="#e91e63">masked</text>
  <rect x="470" y="350" width="58" height="22" rx="4" fill="#fce4ec"/>
  <text x="499" y="366" text-anchor="middle" font-size="10" fill="#e91e63">masked</text>

  <!-- Arrow to V multiply -->
  <line x1="310" y1="430" x2="310" y2="460" stroke="#475569" stroke-width="1.2" marker-end="url(#arr)"/>
  <line x1="290" y1="207" x2="290" y2="440" stroke="#6366f1" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="290" y1="440" x2="310" y2="460" stroke="#6366f1" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="270" y="445" text-anchor="middle" font-size="10" fill="#6366f1">V</text>

  <!-- Weighted sum -->
  <rect x="210" y="463" width="200" height="48" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" filter="url(#sh)"/>
  <text x="310" y="485" text-anchor="middle" font-size="12" font-weight="700" fill="#166534">가중합 (Attention × V)</text>
  <text x="310" y="502" text-anchor="middle" font-size="10" fill="#15803d">문맥이 반영된 새 벡터</text>

  <!-- Multi-Head section -->
  <rect x="50" y="535" width="680" height="72" rx="10" fill="#fefce8" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="390" y="558" text-anchor="middle" font-size="13" font-weight="700" fill="#a16207">Multi-Head Attention: 위 과정을 h개의 head가 병렬 수행 후 Concat</text>

  <rect x="80" y="570" width="120" height="26" rx="5" fill="#fef3c7"/>
  <text x="140" y="588" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">Head 1: 문법 관계</text>
  <rect x="220" y="570" width="120" height="26" rx="5" fill="#fef3c7"/>
  <text x="280" y="588" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">Head 2: 의미 관계</text>
  <rect x="360" y="570" width="120" height="26" rx="5" fill="#fef3c7"/>
  <text x="420" y="588" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">Head 3: 위치 관계</text>
  <rect x="500" y="570" width="120" height="26" rx="5" fill="#fef3c7"/>
  <text x="560" y="588" text-anchor="middle" font-size="10" font-weight="600" fill="#92400e">Head h: ...</text>
  <text x="655" y="588" text-anchor="middle" font-size="11" fill="#a16207">→ Concat → Linear</text>
</svg>